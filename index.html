<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Gilroy-Bold:wght@400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Gilroy-Regular:wght@400&display=swap"
    />
  </head>
  <body>
    <div class="desktop-1">
      <div class="background"></div>
      <section class="purenest-parent">
        <img
          class="purenest-icon"
          loading="lazy"
          alt=""
          src="./public/purenest.webp"
        />

        <div class="frame-child"></div>
        <img
          class="purenest-icon"
          loading="lazy"
          alt=""
          src="./public/herceptin.webp"
        />
      </section>
      <main class="frame-parent">
        <section class="frame-wrapper">
          <div class="frame-group">
            <div class="can-wrapper">
              <h1 class="can">
                <span class="c">C</span>
                <span class="a">a</span>n
              </h1>
            </div>
            <div class="ersoy-wrapper">
              <h2 class="ersoy">
                <span class="c">E</span>r
                <span class="s">s</span>
                <span class="o">o</span>y
              </h2>
            </div>
          </div>
        </section>
        <img
          class="erkosan-icon"
          loading="lazy"
          alt=""
          src="./public/erkosan_image.webp"
        />

        <img
          class="profile-photo-1-icon"
          loading="lazy"
          alt=""
          src="./public/profile-photo.webp"
        />
      </main>
      <footer class="linkedin-parent">
        <img class="linkedin-icon" alt="" src="./public/linkedin.svg" />

        <div class="frame-container">
          <div class="berlin-based-art-director-br-parent">
            <h2 class="berlin-based-art">
              Berlin based Art director & Brand designer
            </h2>
            <div class="frame-div">
              <div class="mailto-parent">
                <img class="mailto-icon" alt="" src="./public/mailto.svg" />

                <img class="insta-icon" alt="" src="./public/insta.svg" />
              </div>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
