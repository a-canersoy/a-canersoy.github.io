<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Landing Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="viewport">
      <div class="stage">
        <section class="frame">
          <article class="card purenest">
            <div class="card-bg"></div>
            <img src="purenest.webp" alt="Purenest project" />
          </article>

          <div class="card plain-card"></div>

          <article class="card herceptin">
            <div class="card-bg"></div>
            <img src="herceptin.webp" alt="Herceptin project" />
          </article>

          <section class="name-block" aria-label="Name and About">
            <div class="name-set name-can-ersoy">
              <h1>Can</h1>
              <h1>Ersoy</h1>
            </div>
            <div class="name-set name-about-me">
              <h1>About</h1>
              <h1>Me</h1>
            </div>
          </section>

          <article class="card erkosan">
            <div class="card-bg"></div>
            <img src="erkosan_image.webp" alt="Erkosan project" />
          </article>

          <img class="profile-photo" src="profile_photo.webp" alt="Profile" />

          <p class="tagline">Berlin based Art director &amp; Brand designer</p>

          <nav class="contact" aria-label="Contact">
            <a href="mailto:ahmetcanersoy@gmail.com" aria-label="Email"><img src="assets/images/mailto.svg" alt="" /></a>
            <a href="https://www.instagram.com/a.canersoyy?igsh=cWFidG1wc2FtbWRl&utm_source=qr" aria-label="Instagram" target="_blank" rel="noopener noreferrer"><img src="assets/images/insta.svg" alt="" /></a>
            <a href="http://www.linkedin.com/in/canersoy-design" aria-label="LinkedIn" target="_blank" rel="noopener noreferrer"><img src="assets/images/linkedin.svg" alt="" /></a>
          </nav>
        </section>
      </div>
    </main>
    <script>
      const FRAME_WIDTH = 1440;
      const FRAME_HEIGHT = 1024;
      const stage = document.querySelector(".stage");
      const frame = document.querySelector(".frame");

      function fitFrame() {
        const isMobileLayout = window.innerWidth <= 900;
        if (isMobileLayout) {
          stage.style.width = "";
          stage.style.height = "";
          frame.style.setProperty("--scale", "1");
          frame.classList.add("is-responsive");
          return;
        }

        frame.classList.remove("is-responsive");
        const scale = Math.min(
          window.innerWidth / FRAME_WIDTH,
          window.innerHeight / FRAME_HEIGHT
        );
        stage.style.width = `${FRAME_WIDTH * scale}px`;
        stage.style.height = `${FRAME_HEIGHT * scale}px`;
        frame.style.setProperty("--scale", `${scale}`);
      }

      fitFrame();
      window.addEventListener("resize", fitFrame);
    </script>
  </body>
</html>
